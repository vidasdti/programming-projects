<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <link rel="stylesheet" href="css/test_style.css">
</head>

<body>

    <div class="pollbox">
        <h3>Survey</h3>
        
        <p> 1. What do you think about the template design?</p>

        <div class="case">
            <input type="radio" name="question1" value="option1"> Very Good
        </div>

        <div class="case">
            <input type="radio" name="question1" value="option2"> Good
        </div>

        <div class="case">
            <input type="radio" name="question1" value="option3"> Average
        </div>

        <div class="case">
            <input type="radio" name="question1" value="option4"> Bad
        </div>

        <p> 2. Would you like to use our services?</p>

        <div class="case">
            <input type="radio" name="question2" value="yes"> Yes
        </div>

        <div class="case">
            <input type="radio" name="question2" value="no"> No
        </div>

        <!-- Submit Button Center -->
        <div class="submit-box">
            <button onclick="submitPoll()">Submit</button>
        </div>

    </div>

    <script src="js/test_script.js"></script>
</body>
</html>
